<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 420 720">

<defs>

<linearGradient id="skin"
x1="0%" y1="0%"
x2="0%" y2="100%">

<stop offset="0%" stop-color="#FFDCCB"/>
<stop offset="100%" stop-color="#F2B89A"/>

</linearGradient>

<linearGradient id="hair"
x1="0%" y1="0%"
x2="0%" y2="100%">

<stop offset="0%" stop-color="#4A2E22"/>
<stop offset="100%" stop-color="#24140F"/>

</linearGradient>

<linearGradient id="dress"
x1="0%" y1="0%"
x2="100%" y2="100%">

<stop offset="0%" stop-color="#FFF8FC"/>
<stop offset="40%" stop-color="#FFE3EF"/>
<stop offset="100%" stop-color="#F8BFD5"/>

</linearGradient>

<radialGradient id="glow">

<stop offset="0%"
stop-color="#FFFFFF"
stop-opacity=".45"/>

<stop offset="100%"
stop-color="#FFFFFF"
stop-opacity="0"/>

</radialGradient>

</defs>


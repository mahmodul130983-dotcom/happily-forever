<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 180 340">

<defs>

<linearGradient id="stem"
x1="0%"
y1="0%"
x2="0%"
y2="100%">

<stop offset="0%" stop-color="#66d77a"/>
<stop offset="100%" stop-color="#2f8f4d"/>

</linearGradient>

<linearGradient id="leaf">

<stop offset="0%" stop-color="#6fdc7f"/>
<stop offset="100%" stop-color="#2b8b4b"/>

</linearGradient>

<radialGradient id="petal">

<stop offset="0%" stop-color="#ffffff"/>

<stop offset="65%" stop-color="#fbfbfb"/>

<stop offset="100%" stop-color="#ececec"/>

</radialGradient>

<radialGradient id="glow">

<stop offset="0%"
stop-color="#ffffff"
stop-opacity=".9"/>

<stop offset="100%"
stop-color="#ffffff"
stop-opacity="0"/>

</radialGradient>

</defs>


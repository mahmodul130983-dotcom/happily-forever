<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 220 420">

<defs>

<linearGradient id="roseStem"
x1="0%" y1="0%"
x2="0%" y2="100%">

<stop offset="0%" stop-color="#56c96d"/>
<stop offset="100%" stop-color="#23793c"/>

</linearGradient>

<linearGradient id="rosePetal"
x1="0%" y1="0%"
x2="100%" y2="100%">

<stop offset="0%" stop-color="#ff6b81"/>
<stop offset="40%" stop-color="#ff2d55"/>
<stop offset="100%" stop-color="#b1002b"/>

</linearGradient>

<radialGradient id="roseGlow">

<stop offset="0%"
stop-color="#ffb3c1"
stop-opacity=".45"/>

<stop offset="100%"
stop-color="#ffb3c1"
stop-opacity="0"/>

</radialGradient>

</defs>

<!-- Glow -->

<circle
cx="110"
cy="90"
r="75"
fill="url(#roseGlow)"/>

<!-- Stem -->

<rect
x="107"
y="110"
width="6"
height="250"
rx="3"
fill="url(#roseStem)"/>

<!-- Leaves -->


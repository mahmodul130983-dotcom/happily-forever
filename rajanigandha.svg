<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 180 420">

<defs>

<linearGradient id="stem"
x1="0%"
y1="0%"
x2="0%"
y2="100%">

<stop offset="0%" stop-color="#63d67d"/>
<stop offset="100%" stop-color="#2d8e4b"/>

</linearGradient>

<linearGradient id="leaf"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#72df87"/>
<stop offset="100%" stop-color="#2f914f"/>

</linearGradient>

<radialGradient id="flower">

<stop offset="0%" stop-color="#ffffff"/>
<stop offset="75%" stop-color="#fafafa"/>
<stop offset="100%" stop-color="#e8e8e8"/>

</radialGradient>

<radialGradient id="glow">

<stop offset="0%"
stop-color="#ffffff"
stop-opacity=".8"/>

<stop offset="100%"
stop-color="#ffffff"
stop-opacity="0"/>

</radialGradient>

</defs>


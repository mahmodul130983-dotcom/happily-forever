<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 300 300">

<defs>

<linearGradient id="wing"

x1="0%"
y1="0%"

x2="100%"
y2="100%">

<stop offset="0%"
stop-color="#ffffff"/>

<stop offset="45%"
stop-color="#f8f8ff"/>

<stop offset="100%"
stop-color="#dfe8ff"/>

</linearGradient>

<linearGradient id="body"

x1="0%"
y1="0%"

x2="0%"
y2="100%">

<stop offset="0%"
stop-color="#5a4636"/>

<stop offset="100%"
stop-color="#2f241d"/>

</linearGradient>

<radialGradient id="glow">

<stop offset="0%"
stop-color="#ffffff"
stop-opacity=".9"/>

<stop offset="100%"
stop-color="#ffffff"
stop-opacity="0"/>

</radialGradient>

</defs>

<!-- Fairy Glow -->

<circle

cx="150"

cy="150"

r="95"

fill="url(#glow)"/>

<!-- Body -->

<ellipse

cx="150"

cy="150"

rx="8"

ry="58"

fill="url(#body)"/>

<!-- Head -->

<circle

cx="150"

cy="88"

r="10"

fill="url(#body)"/>

<!-- Left Upper Wing -->

<path

d="

M145 120

C55 35 20 150 118 170

C135 160 145 145 145 120

"

fill="url(#wing)"


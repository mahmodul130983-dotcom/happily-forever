<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 400 700">

<defs>

<linearGradient id="skin"
x1="0%" y1="0%"
x2="0%" y2="100%">

<stop offset="0%" stop-color="#F5C9A9"/>
<stop offset="100%" stop-color="#E3A47E"/>

</linearGradient>

<linearGradient id="shirt"
x1="0%" y1="0%"
x2="100%" y2="100%">

<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#dfe8f8"/>

</linearGradient>

<linearGradient id="pant"
x1="0%" y1="0%"
x2="0%" y2="100%">

<stop offset="0%" stop-color="#2F4058"/>
<stop offset="100%" stop-color="#162132"/>

</linearGradient>

</defs>


<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>For My Sumu 🤍</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ==========================================
     SKY
========================================== -->

<div id="sky">

<div id="stars"></div>

<div id="moonGlow"></div>

<div id="moon"></div>

<div id="clouds"></div>

</div>

<!-- ==========================================
     PARTICLES
========================================== -->

<div id="particles"></div>

<div id="fireflies"></div>

<div id="petals"></div>

<!-- ==========================================
     GARDEN
========================================== -->

<section id="garden">

<!-- Left Tree -->
<div class="tree tree-left"></div>

<!-- Right Tree -->
<div class="tree tree-right"></div>

<!-- Background Grass -->
<div id="backGrass"></div>

<!-- =======================================
     LILY FIELD
======================================= -->

<div id="lilyField">

<!-- JS will create lilies -->

</div>

<!-- =======================================
     RAJANIGANDHA FIELD
======================================= -->

<div id="rajanField">

<!-- JS will create flowers -->

</div>

<!-- =======================================
     BUTTERFLIES
======================================= -->

<div id="butterflies"></div>

<!-- =======================================
     STONE PATH
======================================= -->

<div id="stonePath"></div>

</section>

<!-- ==========================================
     MESSAGE
========================================== -->

<section id="messageBox">

<h1>

For My Beautiful Sumu 🤍

</h1>

<p id="typing">

</p>

</section>

<!-- ==========================================
     FOOTER
========================================== -->

<div id="footerLove">

Made With ❤️ By Shanto

</div>

<!-- ==========================================
     AUDIO
========================================== -->

<audio
id="bgMusic"
loop>

<source
src="music/love.mp3"
type="audio/mpeg">

</audio>

<!-- ==========================================
     SCRIPT
========================================== -->

<script src="script.js"></script>

</body>

</html>

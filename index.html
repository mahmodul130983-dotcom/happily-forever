<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sumu 🤍</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MAIN ROMANTIC GARDEN CONTAINER -->
    <div id="garden">

        <!-- Sky & Stars System -->
        <div id="sky">
            <div id="stars"></div>
            <div id="moonGlow"></div>
            <div id="moon"></div>
            <div id="clouds"></div>
        </div>

        <!-- Dynamic Particles Layer -->
        <div id="particles"></div>
        <div id="fireflies"></div>
        <div id="petals"></div>
        <div id="fog"></div>

        <!-- Scenery Environment -->
        <div class="tree tree-left"></div>
        <div class="tree tree-right"></div>
        <div id="backGrass"></div>
        <div id="stonePath"></div>
        <div id="grass"></div>

        <!-- Dynamic Flower Fields Generated by JS -->
        <div id="lilyField"></div>
        <div id="rajanField"></div>
        <div id="butterflies"></div>

        <!-- Interactive Characters (SVG) -->
        <object id="sumu" data="assets/svg/sumu.svg" type="image/svg+xml"></object>
        <object id="shanto" data="assets/svg/shanto.svg" type="image/svg+xml"></object>

    </div>

    <!-- PROPOSAL SCENE OVERLAY -->
    <div id="proposalScene">
        <div id="proposalText"></div>
        <button id="proposalButton" style="display:none;">Accept ❤️</button>
    </div>

    <!-- TYPING MESSAGE BOX -->
    <section id="messageBox">
        <h1>For My Beautiful Sumu 🤍</h1>
        <p id="typing"></p>
    </section>

    <!-- FOOTER -->
    <div id="footerLove">
        Made With ❤️ By Shanto
    </div>

    <!-- BACKGROUND AUDIO -->
    <audio id="bgMusic" loop>
        <source src="music/love.mp3" type="audio/mpeg">
    </audio>

    <!-- MAIN SCRIPT -->
    <script src="script.js"></script>
</body>
</html>
